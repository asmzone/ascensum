<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestria en Apps</title>
    <style>
        /* Asegura que html y body ocupen toda la altura de la pantalla */
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* Evita el desplazamiento no deseado */
        }

        /* Centra el iframe y lo ajusta al 100% de altura y ancho */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Elimina el borde */
        }
    </style>
</head>

<body>
    <iframe src="https://eduexpres.co?t=c&a=013502&b=377838&c3=&c=facebook&c2=super-regalazo" frameborder="0"
        allowfullscreen aria-hidden="false" tabindex="0"></iframe>
</body>

</html>
